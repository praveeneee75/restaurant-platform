<!DOCTYPE html>
<html>
<head>
  <title>K'Master POS Owner Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/app.css?v=kmaster-ui">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <div class="auth-brand">
        <span class="brand-mark">K</span>
        <div>
          <p class="eyebrow">K'Master POS</p>
          <h1 id="loginTitle">Owner Login</h1>
        </div>
      </div>
      <p id="brandSupport" class="auth-support"></p>
      <div class="auth-fields">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" placeholder="owner@example.com">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Password">
        <button class="primary-action" onclick="ownerLogin()">Login</button>
      </div>
      <p id="msg" class="form-message"></p>
    </section>
  </main>
  <script src="/js/saas-session.js"></script>
  <script src="/js/owner-login.js"></script>
</body>
</html>
