<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>K'Master QR Menu</title>
  <link rel="stylesheet" href="/css/app.css?v=qr-public-1">
</head>
<body>
  <main>
    <section>
      <h1 id="restaurantName">QR Menu</h1>
      <p id="tableName"></p>
      <p id="qrStatus">Loading menu…</p>
    </section>
    <section>
      <h2>Menu</h2>
      <div id="qrCategories" class="cards"></div>
      <div id="qrItems" class="cards"></div>
    </section>
    <section>
      <h2>Your order</h2>
      <div id="qrCartItems"></div>
      <p><strong id="qrTotal">Total: INR 0.00</strong></p>
      <div class="qr-order-fields">
        <label for="qrCustomerName"><span>Customer name</span><input id="qrCustomerName" required maxlength="120" autocomplete="name" placeholder="Customer name" aria-describedby="qrCustomerNameError"></label>
        <p id="qrCustomerNameError" class="field-error" role="alert"></p>
        <label for="qrCustomerPhone"><span>Mobile number</span><input id="qrCustomerPhone" required inputmode="numeric" maxlength="10" pattern="[0-9]{10}" autocomplete="tel" placeholder="10-digit mobile number" aria-describedby="qrCustomerPhoneError"></label>
        <p id="qrCustomerPhoneError" class="field-error" role="alert"></p>
        <label for="qrOrderNotes"><span>Order notes (optional)</span><textarea id="qrOrderNotes" placeholder="Order notes"></textarea></label>
        <button id="placeQrOrder" type="button">Place Dine-in Order</button>
      </div>
    </section>
  </main>
  <script src="/js/qr-public.js?v=1.0.99"></script>
</body>
</html>
