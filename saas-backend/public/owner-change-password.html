<!DOCTYPE html>
<html lang="en">
<head>
  <title>Change Owner Password | K'Master POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/app.css?v=kmaster-ui">
</head>
<body class="auth-page" data-session-scope="owner">
  <main class="auth-shell">
    <section class="auth-panel">
      <div class="auth-brand">
        <span class="brand-mark">K</span>
        <div>
          <p class="eyebrow">K'Master POS</p>
          <h1>Set your password</h1>
        </div>
      </div>
      <p class="auth-support">Replace the temporary password before accessing restaurant information.</p>
      <div class="auth-fields">
        <label for="currentPassword">Temporary password</label>
        <input id="currentPassword" type="password" autocomplete="current-password">
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" autocomplete="new-password">
        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" type="password" autocomplete="new-password">
        <button id="changePasswordButton" class="primary-action" type="button">Save password</button>
        <button id="logoutButton" class="secondary-action" type="button">Sign out</button>
      </div>
      <p id="msg" class="form-message" role="status"></p>
    </section>
  </main>
  <script src="/js/saas-session.js" data-session-scope="owner"></script>
  <script src="/js/owner-change-password.js?v=20260628-password-reset"></script>
</body>
</html>
