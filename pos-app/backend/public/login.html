<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant POS Login</title>
  <link rel="stylesheet" href="/css/style.css">

</head>

<body>
  <main class="login-box">
    <h2>Restaurant POS Login</h2>
    <label>
      Username
      <input id="username" autocomplete="username" placeholder="Username">
    </label>
    <label>
      PIN
      <input id="pin" type="password" inputmode="numeric" maxlength="4" autocomplete="current-password" placeholder="4 digit PIN">
    </label>
    <button id="loginButton" type="button">Login</button>
    <button id="requestUnlockButton" class="secondary-btn" type="button" hidden>Request unlock</button>
    <p id="msg" role="status"></p>
  </main>

<script src="/js/login.js"></script>

</body>
</html>
