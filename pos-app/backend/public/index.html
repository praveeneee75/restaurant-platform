<!DOCTYPE html>
<html>
<head>
  <title>POS Login</title>
  <link rel="icon" href="/icons/kmaster-logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="login-box">
    <h2>POS Login</h2>
    <span id="appVersion" class="app-version"></span>

    <input id="username" placeholder="Username" />
    <input id="pin" type="password" inputmode="numeric" maxlength="6" placeholder="6 Digit PIN" />

    <button onclick="login()">Login</button>

    <p id="error" style="color:red;"></p>
  </div>

<script src="/js/login.js"></script>
<script src="/js/version-badge.js"></script>
</body>
</html>
