<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Menu</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="pos-shell">
  <main class="pos-center">
    <header>
      <h1 id="restaurantName">Menu</h1>
      <p id="tableName"></p>
    </header>
    <nav id="qrCategories" class="category-tabs"></nav>
    <section id="qrItems" class="item-grid"></section>
  </main>
  <aside class="pos-cart">
    <h2>Your Order</h2>
    <div id="qrCartItems"></div>
    <strong id="qrTotal">Total: 0</strong>
    <input id="qrCustomerName" placeholder="Name optional">
    <input id="qrCustomerPhone" placeholder="Phone optional">
    <button id="placeQrOrder">Place Order</button>
    <p id="qrStatus"></p>
  </aside>
  <script src="/js/qr-menu.js"></script>
</body>
</html>
