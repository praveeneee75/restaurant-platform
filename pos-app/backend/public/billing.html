<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Billing | K'Master POS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="billing-shell">
  <aside class="billing-sidebar">
    <div class="billing-brand">K'MASTER <span>POS</span></div>
    <nav><a class="active" href="/billing.html">Billing</a><a href="/pos-live.html">POS orders</a><a href="/orders.html">Reports</a><a href="/admin.html#invoices">Invoices</a></nav>
    <div class="billing-recent"><h3>Recent order details</h3><div class="billing-tabs"><button data-recent-filter="DINE_IN">Dine in</button><button data-recent-filter="TAKEAWAY">Parcel</button><button data-recent-filter="ALL" class="active">All</button></div><div id="recentOrders"></div></div>
  </aside>
  <main class="billing-main">
    <header class="billing-topbar"><div><h1>Table View</h1><p id="billingStatus">Loading billing data...</p></div><div class="billing-actions"><button id="refreshBilling" class="secondary-btn">Refresh</button><a class="secondary-btn" href="/pos-live.html">Open POS</a></div></header>
    <section class="billing-toolbar"><div class="billing-legend"><span><i class="legend blank"></i>Available</span><span><i class="legend running"></i>Running</span><span><i class="legend paid"></i>Paid</span><span><i class="legend kot"></i>Running KOT</span></div><input id="billingSearch" type="search" placeholder="Search table, order or customer"></section>
    <section id="tableMap" class="billing-table-map"></section>
    <section class="billing-summary-panel"><div><span>Open bills</span><strong id="openBills">0</strong></div><div><span>Paid today</span><strong id="paidToday">0</strong></div><div><span>Today's collection</span><strong id="collectionTotal">INR 0.00</strong></div></section>
  </main>
  <aside class="billing-detail" id="billingDetail"><div class="billing-empty">Select a table or recent order to view the bill.</div></aside>
  <script src="/js/billing.js"></script>
</body>
</html>
