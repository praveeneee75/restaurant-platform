<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Orders</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="orders-shell">
  <header class="orders-topbar">
    <div>
      <h1>Live Orders</h1>
      <p id="ordersStatus">Loading orders...</p>
    </div>
    <div class="toolbar">
      <a class="secondary-btn" href="/pos-live.html">Open POS</a>
      <a class="secondary-btn" href="/admin.html">Admin</a>
      <button id="refreshOrders" type="button">Refresh</button>
    </div>
  </header>

  <main class="orders-main">
    <section class="editor-panel">
      <h2>Delivery Partners</h2>
      <form class="partner-row" id="partnerForm">
        <input type="hidden" id="partnerId">
        <input id="partnerName" placeholder="Partner name" required>
        <input id="partnerPhone" placeholder="Phone">
        <select id="partnerProviderCode">
          <option value="IN_HOUSE">In-house</option>
          <option value="SWIGGY">Swiggy</option>
          <option value="ZOMATO">Zomato</option>
          <option value="DUNZO">Dunzo</option>
          <option value="CUSTOM">Custom</option>
        </select>
        <select id="partnerIntegrationType">
          <option value="MANUAL">Manual</option>
          <option value="API">API</option>
          <option value="WEBHOOK">Webhook</option>
          <option value="AGGREGATOR">Aggregator</option>
        </select>
        <input id="partnerApiBaseUrl" placeholder="API base URL">
        <input id="partnerMerchantId" placeholder="Merchant ID">
        <input id="partnerExternalStoreId" placeholder="Store ID">
        <label class="check-row"><input id="partnerIntegrationEnabled" type="checkbox"> Integration enabled</label>
        <button>Save Partner</button>
      </form>
      <div id="partnersList"></div>
    </section>

    <section class="table-panel">
      <div class="toolbar">
        <select id="orderTypeFilter">
          <option value="">All order types</option>
          <option value="DINE_IN">Dine In</option>
          <option value="TAKEAWAY">Takeaway</option>
          <option value="DELIVERY">Delivery</option>
          <option value="PARCEL">Parcel</option>
          <option value="PHONE_ORDER">Phone Order</option>
          <option value="ONLINE_ORDER">Online Order</option>
        </select>
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="OPEN">Open</option>
          <option value="PREPARING">Preparing</option>
          <option value="READY">Ready</option>
          <option value="SERVED">Served</option>
          <option value="PAID">Paid</option>
        </select>
      </div>
      <div class="orders-list" id="ordersList"></div>
    </section>

    <section class="table-panel">
      <h2>Order Type Summary</h2>
      <div class="orders-report-grid" id="ordersReport"></div>
    </section>
  </main>

  <script src="/js/orders.js"></script>
</body>
</html>
