<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Display</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="kds-shell">
  <header class="app-home-nav">
    <div class="app-home-brand"><strong>K'MASTER</strong> <span>POS</span><small id="kdsRestaurantName">Kitchen Display</small></div>
    <nav aria-label="POS home sections">
      <a href="/pos-live.html?mode=DINE_IN">POS Dine In</a><a href="/pos-live.html?mode=PARCEL">POS Parcel</a><a href="/pos-live.html?mode=PARTY">POS Party Order</a><a href="/billing.html">Billing</a><a data-role-nav="invoices" href="/admin.html?view=invoices&standalone=1#invoices">Invoices</a><a class="active" href="/kds.html">KDS</a><a data-role-nav="availability" href="/admin.html?view=items&standalone=1">Availability</a><a data-role-nav="live-orders" href="/orders.html">Live Orders</a><a data-role-nav="admin" href="/admin.html">Admin</a><button data-notification-center type="button">Notifications <span data-notification-count>0</span></button><button data-logout type="button">Logout</button>
    </nav>
  </header>
  <header class="kds-topbar">
    <div>
      <h1>Kitchen Display</h1>
      <p id="kdsStatus">Loading orders...</p>
    </div>
    <div class="kds-controls">
      <button id="kdsBackBtn" class="secondary-btn" type="button" hidden>Back</button>
      <select id="kitchenSelect"></select>
      <button id="refreshKds" class="secondary-btn">Refresh</button>
    </div>
  </header>

  <main class="kds-board">
    <section class="kds-column" data-status="PENDING">
      <h2>New Orders</h2>
      <div id="kdsPending" class="kds-list"></div>
    </section>
    <section class="kds-column" data-status="PREPARING">
      <h2>Preparing</h2>
      <div id="kdsPreparing" class="kds-list"></div>
    </section>
    <section class="kds-column" data-status="READY">
      <h2>Ready</h2>
      <div id="kdsReady" class="kds-list"></div>
    </section>
  </main>

  <script src="/js/ui-feedback.js"></script>
  <script src="/js/nav-notifications.js"></script>
  <script src="/js/kds.js"></script>
</body>
</html>
