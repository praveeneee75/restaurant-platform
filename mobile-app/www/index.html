<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Restaurant Mobile</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <main class="app-shell">
    <section class="brand-panel">
      <div class="logo" id="brandLogo">POS</div>
      <div>
        <p class="eyebrow">White-label restaurant app</p>
        <h1 id="brandName">Restaurant Mobile</h1>
        <strong id="activeRestaurantName" class="active-restaurant">No restaurant selected</strong>
        <p id="brandStatus">Select your restaurant and sign in.</p>
      </div>
    </section>

    <section class="login-panel" id="loginView">
      <label>Restaurant
        <select id="restaurantSelect"></select>
      </label>
      <label>Username
        <input id="username" autocomplete="username" placeholder="admin">
      </label>
      <label>PIN
        <input id="pin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="4 digit PIN">
      </label>
      <button id="loginButton" type="button">Login</button>
      <p id="loginStatus" class="status-line">Loading restaurants...</p>
    </section>

    <section class="dashboard-panel" id="dashboardView" hidden>
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">Signed in</p>
          <h2 id="dashboardTitle">Mobile Dashboard</h2>
          <p id="dashboardStatus" class="status-line">Choose your workspace.</p>
        </div>
        <button id="logoutButton" type="button" class="secondary-button">Logout</button>
      </header>
      <div class="role-grid">
        <button data-role="owner" type="button">Owner Dashboard</button>
        <button data-role="captain" type="button">Captain Ordering</button>
        <button data-role="waiter" type="button">Waiter Ordering</button>
        <button data-role="cashier" type="button">Cashier POS</button>
      </div>
    </section>

    <section class="webview-panel" id="webviewPanel" hidden>
      <header>
        <strong id="activeRole">Mobile View</strong>
        <button id="closeFrame" type="button">Close</button>
      </header>
      <iframe id="appFrame" title="Restaurant app view"></iframe>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
